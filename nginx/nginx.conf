server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # ⭐ NUEVA REGLA PARA TU PÁGINA DE WHATSAPP
    # Esto le dice a Nginx que una petición exacta a /whatsapp
    # debe servir el archivo /whatsapp.html.
    location = /whatsapp {
        try_files /whatsapp.html =404;
    }

    # Servir archivos estáticos (tu regla general)
    location / {
        try_files $uri $uri/ /index.html; # Modificación sugerida para SPAs
    }

    # El resto de tu configuración de caché, gzip, etc. se mantiene igual...
    location ~* \.(jpg|jpeg|png|gif|webp|avif|ico|svg|mp4|glb|gltf)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}